model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_instructions_file = "/Users/shu/.codex/AGENTS.md"
approvals_reviewer = "guardian_subagent"
# Auto-compact at 60% of GPT-5.5's 272k context window.
model_auto_compact_token_limit = 163200

[projects."/Users/shu/GitHub/starapp"]
trust_level = "trusted"

[projects."/Users/shu/GitHub/staropt"]
trust_level = "trusted"

[projects."/Users/shu/GitHub"]
trust_level = "trusted"

[projects."/Users/shu/GitHub/feat"]
trust_level = "trusted"

[projects."/Users/shu/GitHub/aces"]
trust_level = "trusted"

[projects."/Users/shu/GitHub/anya"]
trust_level = "trusted"

[projects."/Users/shu/GitHub/loci"]
trust_level = "trusted"

[projects."/Users/shu/GitHub/gral"]
trust_level = "trusted"

[projects."/Users/shu/GitHub/star"]
trust_level = "trusted"

[plugins."github@openai-curated"]
enabled = true

[features]
codex_hooks = true

[tui]
theme = "gruvbox-dark"
status_line = [
  "model-with-reasoning",
  "context-used",
  "context-window-size",
  "current-dir",
  "git-branch",
]
