# gral local workstation policy.
#
# Goal:
# - Leaving Sway should return to a locked TTY login prompt.
# - Long-running tmux jobs should keep running after local logout.
# - The machine should not auto-suspend; shutdown/reboot is manual.

[Login]
KillUserProcesses=no
IdleAction=ignore
HandleLidSwitch=ignore
HandleLidSwitchExternalPower=ignore
HandleLidSwitchDocked=ignore
