unbind C-b
set -g prefix None
set -g mouse on
set-option -sg escape-time 0
set-option -g focus-events on
set-option -sa terminal-overrides ',xterm-256color:RGB'

# Mouse wheel should scroll panes/copy-mode, not switch windows from statusline.
unbind -q -T root WheelUpStatus
unbind -q -T root WheelDownStatus

# new window, switch window with number
# split window, v and h, move, resize

# basic window and pane manipulation
bind -n C-n new-window -c "#{pane_current_path}"
# First split: 25% / 75%; later splits: default 50% / 50%.
bind -n C-t if -F "#{==:#{window_panes},1}" "split-window -h -p 75 -c '#{pane_current_path}'" "split-window -h -c '#{pane_current_path}'" \; select-pane -L
bind -n C-h previous-window
bind -n C-l select-pane -t :.+
bind -n C-w kill-window
bind -n C-k choose-tree -Zs
# bind -n C-] resize-pane -R 20 # not working
# bind -n C-[ resize-pane -L 20 # not working

#### copy mode : vim ####
# set vi mode for copy mode
setw -g mode-keys vi

# copy mode using 'Esc'
unbind [
bind Escape copy-mode

# start window numbers at 1 to match keyboard order with tmux order
set -g base-index 1

#### COLOUR (Grayscale) — matches lualine gruvbox normal-mode
# copy-mode/choose-mode highlight: matches status-left session-name chip
setw -g mode-style fg='#282828',bg='#a89984',bold
setw -g copy-mode-selection-style fg='#282828',bg='#a89984',bold
setw -g copy-mode-position-style fg='#282828',bg='#a89984',bold
setw -g copy-mode-mark-style fg='#282828',bg='#a89984',bold

# statusbar (c/y/z sections mirror lualine gruvbox normal-mode)
set -g status-interval 1
set -g status-style fg='#a89984',bg='#3c3836',bold
set -g status-left '#[fg=#282828,bg=#a89984,bold] #S #[default]'
set -g status-left-length 20
set -g status-right '#[fg=#ebdbb2,bg=#504945,bold]#(sh $HOME/.local/bin/tmux-system-status.sh)#[fg=#282828,bg=#a89984,bold] %m-%d %H:%M '
set -g status-position bottom

# window title colors (current = b-section: #504945 bg, #ebdbb2 fg)
setw -g window-status-style fg='#bdae93',bg=default,bold
set -g @window_tab_path '#{s|.*/([^/])[^/]*/([^/]+)$|\1/\2|:pane_current_path}'
set -g @window_tab_bg '#{?window_active,#504945,default}'
set -g @window_tab_reset_style '#[fg=#a89984,bold]#[bg=#{E:@window_tab_bg}]'

# Agent context/status in tabs is disabled; agents now expose their own panels.
# Keep the legacy tab status wiring here for easy rollback.
