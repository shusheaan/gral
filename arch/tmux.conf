# set -g @window_tab_ai_done '#{||:#{==:#{@workmux_status},DONE},#{==:#{@workmux_status},done}}'
# set -g @window_tab_ai_color '#{?#{E:@window_tab_ai_done},#a9b665,#{?#{||:#{==:#{@workmux_status},...},#{==:#{@workmux_status},waiting}},#ea6962,#d8a657}}'
# set -g @window_tab_ai_style '#[fg=#282828]#[bg=#{E:@window_tab_ai_color}]#[bold]'
# set -g @window_tab_format '#[bg=#{E:@window_tab_bg}] #[fg=#ebdbb2]#I#[fg=#a89984]:#[fg=#ebdbb2]#{E:@window_tab_path}#{?@workmux_status,#[fg=#a89984] · #[fg=#{E:@window_tab_context_color}]#{E:@window_tab_context} #{E:@window_tab_ai_style}#{E:@window_tab_ai_text}#{E:@window_tab_reset_style},} #{E:@window_tab_reset_style}'

set -g @window_tab_format '#[bg=#{E:@window_tab_bg},bold] #[fg=#ebdbb2,bold]#I#[fg=#a89984,bold]:#[fg=#ebdbb2,bold]#{E:@window_tab_path} #{E:@window_tab_reset_style}'
setw -g window-status-format '#{E:@window_tab_format}'
setw -g window-status-current-style fg='#ebdbb2',bg='#504945',bold
setw -g window-status-current-format '#{E:@window_tab_format}'

# pane border: native tmux split-bar indicator.
set -g pane-border-indicators colour
set -g pane-border-style fg='#3c3836'
set -g pane-active-border-style fg='#a89984'

# message text
set -g message-style fg='#ebdbb2',bg='#3c3836'

# pane number display
set -g display-panes-active-colour '#bdae93'
set -g display-panes-colour '#665c54'

# clock
setw -g clock-mode-colour '#a89984'

# bell
setw -g window-status-bell-style fg='#ea6962',bg=default,bold
setw -g window-status-activity-style fg='#d8a657',bg=default,bold
