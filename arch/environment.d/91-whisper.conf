# Local Whisper dictation defaults.
# `~/.zprofile` sources this before you manually run `sway`, so the Sway keybinding inherits it.

# Highest-accuracy default. First setup downloads the model into the Whisper cache.
WHISPER_MODEL=large-v3

# `transcribe` keeps the original Chinese/English text. `translate` outputs English.
WHISPER_TASK=transcribe

# Empty means auto language detection, which is best for Chinese/English mixed speech.
# Set to `zh` only if you mostly speak Chinese and want to force Chinese decoding.
WHISPER_LANGUAGE=

# Optional custom venv location. Leave unset to prefer system Python when torch+whisper are installed.
# If system Python lacks torch/whisper, whisper-dictation-setup falls back to:
# ~/.local/share/gral-whisper/.venv
# WHISPER_VENV=
