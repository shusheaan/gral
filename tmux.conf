unbind C-b
set -g prefix None
set -g mouse on
set-option -sg escape-time 10
set-option -g focus-events on
set-option -sa terminal-overrides ',xterm-256color:RGB'

# new window, switch window with number
# split window, v and h, move, resize

# basic window and pane manipulation
bind -n C-n new-window
bind -n C-t split-window -h \; # resize-pane -x 130
bind -n C-j next-window
bind -n C-k previous-window
bind -n C-h select-pane -L
bind -n C-l select-pane -R
# bind -n C-] resize-pane -R 20 # not working
# bind -n C-[ resize-pane -L 20 # not working

#### copy mode : vim ####
# set vi mode for copy mode
setw -g mode-keys vi

# copy mode using 'Esc'
unbind [
bind Escape copy-mode

# start window numbers at 1 to match keyboard order with tmux order
set -g base-index 1

#### COLOUR (Gruvbox Dark)
# statusbar
set -g status-style fg='#ebdbb2',bg='#282828'
set -g status-right ''
set -g status-position top

# window title colors
setw -g window-status-style fg='#a89984',bg=default
setw -g window-status-current-style fg='#fabd2f',bg=default,bold

# pane border
set -g pane-border-style fg='#3c3836'
set -g pane-active-border-style fg='#a9b665'

# message text
set -g message-style fg='#d79921',bg='#282828'

# pane number display
set -g display-panes-active-colour '#83a598'
set -g display-panes-colour '#d79921'

# clock
setw -g clock-mode-colour '#98971a'

# bell
setw -g window-status-bell-style fg='#282828',bg='#cc241d'
