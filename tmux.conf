unbind C-b
set -g prefix None
set -g mouse on
set-option -sg escape-time 10
set-option -g focus-events on
set-option -sa terminal-overrides ',xterm-256color:RGB'

# Mouse wheel should scroll panes/copy-mode, not switch windows from statusline.
unbind -q -T root WheelUpStatus
unbind -q -T root WheelDownStatus

# new window, switch window with number
# split window, v and h, move, resize

# basic window and pane manipulation
bind -n C-n new-window -c "#{pane_current_path}" \; split-window -h -p 75 -c "#{pane_current_path}" \; select-pane -L
bind -n C-t split-window -h \; select-pane -L # resize-pane -x 130
bind -n C-h previous-window
bind -n C-l select-pane -t :.+
bind -n C-w kill-window
# bind -n C-] resize-pane -R 20 # not working
# bind -n C-[ resize-pane -L 20 # not working

#### copy mode : vim ####
# set vi mode for copy mode
setw -g mode-keys vi

# copy mode using 'Esc'
unbind [
bind Escape copy-mode

# start window numbers at 1 to match keyboard order with tmux order
set -g base-index 1

#### COLOUR (Grayscale) — matches lualine gruvbox normal-mode
# copy-mode/choose-mode highlight: soft gray background with dark text
setw -g mode-style fg='#1d2021',bg='#d6d6d6'
setw -g copy-mode-selection-style fg='#1d2021',bg='#d6d6d6'
setw -g copy-mode-position-style fg='#1d2021',bg='#d6d6d6'
setw -g copy-mode-mark-style fg='#1d2021',bg='#d6d6d6'

# statusbar (c-section: #3c3836 bg, #a89984 fg)
set -g status-interval 1
set -g status-style fg='#a89984',bg='#3c3836'
set -g status-left '#[fg=#282828,bg=#a89984,bold] #S #[default]'
set -g status-left-length 20
set -g status-right '#[fg=#282828,bg=#928374,bold]#(sh $HOME/GitHub/gral/tmux-system-status.sh)#[fg=#282828,bg=#a89984,bold] %m-%d %H:%M '
set -g status-position bottom

# window title colors (current = b-section: #504945 bg, #ebdbb2 fg)
setw -g window-status-style fg='#bdae93',bg=default
set -gu @agent_context_pct
set -gu @workmux_status
set -g @window_tab_path '#{s|.*/([^/])[^/]*/([^/]+)$|\1/\2|:pane_current_path}(#(sh /Users/shu/.tmux-branch.sh "#{pane_current_path}"))'
set -g @window_tab_context '#{?@agent_context_pct,#{@agent_context_pct},--}'
set -g @window_tab_context_color '#{?#{>:#{s|%||:#{@agent_context_pct}},50},#d8a657,#a9b665}'
set -g @window_tab_ai_text '#{?#{||:#{m:*>>>*,#{@workmux_status}},#{==:#{@workmux_status},working}},>>>,#{?#{||:#{==:#{@workmux_status},...},#{==:#{@workmux_status},waiting}},...,#{?#{||:#{==:#{@workmux_status},DONE},#{==:#{@workmux_status},done}},DONE,#{@workmux_status}}}}'
set -g @window_tab_ai_done '#{||:#{==:#{@workmux_status},DONE},#{==:#{@workmux_status},done}}'
set -g @window_tab_ai_color '#{?#{E:@window_tab_ai_done},#a9b665,#{?#{||:#{==:#{@workmux_status},...},#{==:#{@workmux_status},waiting}},#ea6962,#d8a657}}'
set -g @window_tab_ai_style '#[fg=#{E:@window_tab_ai_color}]#[bg=default]'
set -g @window_tab_format ' #[fg=#ebdbb2]#I#[fg=#a89984]:#[fg=#ebdbb2]#{E:@window_tab_path}#{?@workmux_status,#[fg=#a89984] · #[fg=#{E:@window_tab_context_color}]#{E:@window_tab_context} #{E:@window_tab_ai_style}#{E:@window_tab_ai_text}#[fg=#a89984]#[bg=default]#[nobold],} #[default]'
setw -g window-status-format '#{E:@window_tab_format}#{?0,#{@workmux_status},}'
setw -g window-status-current-style fg='#ebdbb2',bg='#504945',bold
setw -g window-status-current-format '#{E:@window_tab_format}#{?0,#{@workmux_status},}'

# pane border: native tmux split-bar indicator.
set -g pane-border-indicators colour
set -g pane-border-style fg='#3c3836'
set -g pane-active-border-style fg='#a89984'

# message text
set -g message-style fg='#ebdbb2',bg='#3c3836'

# pane number display
set -g display-panes-active-colour '#bdae93'
set -g display-panes-colour '#665c54'

# clock
setw -g clock-mode-colour '#a89984'

# bell
setw -g window-status-bell-style fg='#1d2021',bg='#a89984'
